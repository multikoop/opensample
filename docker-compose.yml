services:
  mariadb:
    image: mariadb:${MARIADB_VERSION:-11.4}
    container_name: opensample-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-opensample}
      MARIADB_USER: ${DB_USER:-opensample}
      MARIADB_PASSWORD: ${DB_PASSWORD:-opensample}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - mariadb_data:/var/lib/mysql

  cassandra:
    image: cassandra:${CASSANDRA_VERSION:-5.0}
    container_name: opensample-cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME:-OpenSampleCluster}
      CASSANDRA_DC: ${CASSANDRA_DATACENTER:-datacenter1}
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    volumes:
      - cassandra_data:/var/lib/cassandra

  localstack:
    image: localstack/localstack:${LOCALSTACK_VERSION:-3.8}
    container_name: opensample-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ${S3_REGION:-eu-central-1}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-test}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-test}
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - localstack_data:/var/lib/localstack

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION:-v24.3.7}
    container_name: opensample-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.19.1}
    container_name: opensample-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-OpenSampleAdmin123!}
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "${OPENSEARCH_PERF_PORT:-9600}:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION:-2.19.1}
    container_name: opensample-opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  mariadb_data:
  cassandra_data:
  localstack_data:
  redpanda_data:
  opensearch_data:
