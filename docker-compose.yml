services:
  mariadb:
    image: mariadb:${MARIADB_VERSION:-11.4}
    container_name: opensample-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-opensample}
      MARIADB_USER: ${DB_USER:-opensample}
      MARIADB_PASSWORD: ${DB_PASSWORD:-opensample}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
