spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:opensample}
    username: ${DB_USER:opensample}
    password: ${DB_PASSWORD:opensample}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:5000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MariaDBDialect
    properties:
      hibernate.boot.allow_jdbc_metadata_access: false
  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yaml
  thymeleaf:
    cache: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}

app:
  cassandra:
    host: ${CASSANDRA_HOST:localhost}
    port: ${CASSANDRA_PORT:9042}
    datacenter: ${CASSANDRA_DATACENTER:datacenter1}
    keyspace: ${CASSANDRA_KEYSPACE:opensample}
    connect-timeout-ms: ${CASSANDRA_CONNECT_TIMEOUT_MS:3000}
    request-timeout-ms: ${CASSANDRA_REQUEST_TIMEOUT_MS:5000}
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:4566}
    region: ${S3_REGION:eu-central-1}
    access-key: ${S3_ACCESS_KEY:test}
    secret-key: ${S3_SECRET_KEY:test}
    bucket: ${S3_BUCKET:sample-bucket}
    path-style-access-enabled: ${S3_PATH_STYLE_ACCESS_ENABLED:true}
    request-timeout-ms: ${S3_REQUEST_TIMEOUT_MS:5000}
    seed-files-directory: ${S3_SEED_FILES_DIRECTORY:src/test/resources/s3/sample-bucket}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topic: ${KAFKA_TOPIC:sample-account-events}
    partitions: ${KAFKA_TOPIC_PARTITIONS:1}
    replication-factor: ${KAFKA_TOPIC_REPLICATION_FACTOR:1}
    request-timeout-ms: ${KAFKA_REQUEST_TIMEOUT_MS:5000}
    poll-timeout-ms: ${KAFKA_POLL_TIMEOUT_MS:700}
    max-events: ${KAFKA_MAX_EVENTS:250}
