<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenSample - Cassandra</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="layout">
    <header class="hero">
        <h1>Cassandra Daten</h1>
        <p>Die Tabelle wird aus Cassandra gelesen (manueller Schema+Seed Lauf).</p>
    </header>

    <div th:replace="~{fragments/tabs :: mainTabs(${activeTab})}"></div>

    <section class="panel fade-in">
        <h2>Sample Data</h2>
        <p th:if="${dbError}" class="inline-error" th:text="${dbError}"></p>
        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Created At (UTC)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.id}"></td>
                <td th:text="${item.name}"></td>
                <td th:text="${item.description}"></td>
                <td th:text="${item.createdAt}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="4">Keine Daten verfuegbar.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
