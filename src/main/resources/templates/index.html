<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenSample - Startseite</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="layout">
    <header class="hero">
        <h1>OpenSample</h1>
        <p>Spring Boot 3.4.3 with MariaDB, Liquibase, Thymeleaf, REST and OpenAPI.</p>
    </header>

    <div th:replace="~{fragments/tabs :: mainTabs(${activeTab})}"></div>

    <section class="panel fade-in">
        <h2>Startseite</h2>
        <p>Diese Seite dient als Einstieg. Weitere geplante Tabs: S3, Cassandra, Kafka.</p>
        <p>API: <a href="/api/v1/sample-data">/api/v1/sample-data</a></p>
        <p>OpenAPI: <a href="/swagger-ui.html">/swagger-ui.html</a> oder <a href="/v3/api-docs.yaml">/v3/api-docs.yaml</a></p>
    </section>
</main>
</body>
</html>
