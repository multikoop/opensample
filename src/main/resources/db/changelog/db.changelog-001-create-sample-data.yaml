databaseChangeLog:
  - changeSet:
      id: 001-create-sample-data
      author: codex
      changes:
        - createTable:
            tableName: sample_data
            remarks: Sample table used in thymeleaf and REST examples
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_sample_data
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(400)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
